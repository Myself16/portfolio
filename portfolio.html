<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f4f4;
            scroll-behavior: smooth;
        }

        header {
            background: #222;
            color: #fff;
            padding: 1em 2em;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header nav a {
            color: #fff;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        header nav a:hover {
            color: #ff9800;
        }

        section {
            padding: 60px 20px;
            max-width: 1000px;
            margin: auto;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.6s ease-out;
        }

        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h1,
        h2 {
            text-align: center;
            color: #333;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .project {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .project:hover {
            transform: scale(1.05);
        }

        .filters {
            text-align: center;
            margin-top: 20px;
        }

        .filters button {
            margin: 5px;
            padding: 10px 15px;
            border: none;
            background: #222;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .filters button.active,
        .filters button:hover {
            background: #ff9800;
        }

        form {
            max-width: 600px;
            margin: auto;
            display: flex;
            flex-direction: column;
        }

        form input,
        form textarea {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #aaa;
        }

        form button {
            background: #222;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        form button:hover {
            background: #ff9800;
        }
    </style>
</head>

<body>

    <header>
        <h2>My Portfolio</h2>
        <nav>
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section id="about">
        <h1>About Me</h1>
        <p style="text-align:center">I'm a passionate web developer who loves building interactive and responsive
            websites.</p>
    </section>

    <section id="projects">
        <h1>Projects</h1>
        <div class="filters">
            <button class="active" onclick="filterProjects('all')">All</button>
            <button onclick="filterProjects('web')">Web</button>
            <button onclick="filterProjects('mobile')">Mobile</button>
        </div>
        <div class="projects">
            <div class="project" data-category="web">🌐 Portfolio Website</div>
            <div class="project" data-category="mobile">📱 Flutter App</div>
            <div class="project" data-category="web">🛒 E-Commerce Site</div>
            <div class="project" data-category="mobile">🎮 Mobile Game</div>
        </div>
    </section>

    <section id="contact">
        <h1>Contact Me</h1>
        <form onsubmit="validateForm(event)">
            <input type="text" id="name" placeholder="Your Name" required />
            <input type="email" id="email" placeholder="Your Email" required />
            <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    <script>
        // Scroll reveal
        const sections = document.querySelectorAll('section');
        const revealOnScroll = () => {
            const triggerBottom = window.innerHeight * 0.9;
            sections.forEach(section => {
                const boxTop = section.getBoundingClientRect().top;
                if (boxTop < triggerBottom) {
                    section.classList.add('visible');
                }
            });
        };
        window.addEventListener('scroll', revealOnScroll);
        window.addEventListener('load', revealOnScroll);

        // Project filtering
        function filterProjects(category) {
            const projects = document.querySelectorAll('.project');
            document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            projects.forEach(project => {
                if (category === 'all' || project.dataset.category === category) {
                    project.style.display = 'block';
                } else {
                    project.style.display = 'none';
                }
            });
        }

        // Contact form validation
        function validateForm(event) {
            event.preventDefault();
            const name = document.getElementById('name');
            const email = document.getElementById('email');
            const message = document.getElementById('message');

            if (!name.value || !email.value || !message.value) {
                alert('Please fill out all fields!');
                return;
            }

            alert('Message sent successfully!');
            name.value = '';
            email.value = '';
            message.value = '';
        }
    </script>

</body>

</html>
